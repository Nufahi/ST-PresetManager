<div class="preset-manager-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>⊹ PRESET MANAGER ⊹</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down up"></div>
        </div>
        <div class="inline-drawer-content" style="display: none;">

            <div class="prm_settings_card">
                <p class="prm_settings_intro">Browse, multi-select, bulk-delete and edit your Chat Completion presets — prompts and parameters, neatly separated.</p>

                <button id="prm_open_button" type="button" class="prm_settings_primary interactable">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Open Preset Manager</span>
                </button>

                <div class="prm_settings_section">
                    <h4 class="prm_settings_heading">Behavior</h4>

                    <label class="prm_set_row prm_set_toggle" for="prm_enabled">
                        <span class="prm_set_text">
                            <span class="prm_set_label">Enable Preset Manager</span>
                            <span class="prm_set_desc">Turn the whole manager on or off. When off, the open button and the preset-list icon do nothing.</span>
                        </span>
                        <input id="prm_enabled" type="checkbox" checked />
                    </label>

                    <label class="prm_set_row prm_set_toggle" for="prm_show_select_icon">
                        <span class="prm_set_text">
                            <span class="prm_set_label">Show icon next to the preset dropdown</span>
                            <span class="prm_set_desc">Adds a small button beside the Chat Completion preset selector to open the manager.</span>
                        </span>
                        <input id="prm_show_select_icon" type="checkbox" checked />
                    </label>

                    <label class="prm_set_row prm_set_toggle" for="prm_confirm_delete">
                        <span class="prm_set_text">
                            <span class="prm_set_label">Confirm before deleting</span>
                            <span class="prm_set_desc">Ask for confirmation before removing presets.</span>
                        </span>
                        <input id="prm_confirm_delete" type="checkbox" checked />
                    </label>
                </div>
            </div>

        </div>
    </div>
</div>
